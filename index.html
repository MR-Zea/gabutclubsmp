<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GabutClub SMP</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Background image */
.bg {
    position: fixed;
    width: 150%;
    height: 150%;
    background: url('https://wallpapercave.com/wp/wp10997593.jpg') no-repeat center center/cover;
    filter: blur(5px);
    z-index: -1;
}

/* Card */
.card {
    background: rgba(20, 20, 20, 0.8);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* Logo */
.logo {
    width: 70px;
    height: 70px;
    margin-bottom: 10px;
    border-radius: 10px;
}

/* Title */
.title {
    font-size: 24px;
    font-weight: bold;
    color: white;
}

/* Subtitle */
.subtitle {
    color: #bbb;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.btn {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-size: 14px;
    transition: 0.2s;
}

.btn:hover {
    background: rgba(255,255,255,0.15);
}

/* IP box */
.ip-box {
    margin-top: 20px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: white;
}

.copy {
    cursor: pointer;
}

.server-status {
    margin-bottom: 20px;
    font-size: 14px;
    color: #ccc;
}

.online {
    color: #4ade80; /* hijau */
    font-weight: bold;
}

.offline {
    color: #f87171; /* merah */
    font-weight: bold;
}
    .player-box {
    margin-top: 15px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    color: white;
    font-size: 13px;
    max-height: 120px;
    overflow-y: auto;
}

.player-box p {
    margin: 0 0 8px 0;
    font-weight: bold;
    color: #ccc;
}

.player-name {
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

    <img src="logo.png" class="logo">

    <div class="title">GabutClub SMP</div>
    <div class="subtitle">The new SMP Server</div>

    <div class="server-status">
    <span id="status">Loading...</span><br>
    <span id="players">-</span>
    </div>

    <div class="buttons">
        <a href="https://discord.gg/k9ECUKCQmb" class="btn">Discord</a>
        <a href="https://minecraftpocket-servers.com/server/133112/vote/" class="btn">Vote</a>
        <a href="https://chat.whatsapp.com/FKC7yd68vxUDAJQoIFrUFn" class="btn">Whatsapp Group</a>
        <a href="https://youtube.com/@zea_lott?si=rxbWXQItdm3EXaLX" class="btn">YouTube</a>
    </div>

    <p style="color:white;">Ip address & Port</p>
    <div class="ip-box">
        <span id="ip">gabutclub.my.id</span>
        <span class="copy" onclick="copyIP()">📋</span>
    </div>
    <div class="ip-box">
        <span id="port">21064</span>
        <span class="copy" onclick="copyPort()">📋</span>
    </div>
    <div class="player-box">
    <p>Online Players</p>
    <div id="player-list">Loading...</div>
    </div>
</div>

<script>
function copyIP() {
    const ip = document.getElementById("ip").innerText;
    navigator.clipboard.writeText(ip);
    alert("IP copied!");
}
function copyPort() {
    const ip = document.getElementById("port").innerText;
    navigator.clipboard.writeText(ip);
    alert("Port copied!");
}

async function loadServer() {
  try {
    const res = await fetch("https://api.mcsrvstat.us/bedrock/2/basic-3.alstore.space:21064");
    const data = await res.json();

    if (data.online) {
      document.getElementById("status").innerHTML =
        '<span class="online">● Online</span>';
      document.getElementById("players").innerText =
        data.players.online + " / " + data.players.max + " Players";
    } else {
      document.getElementById("status").innerHTML =
        '<span class="offline">● Offline</span>';
      document.getElementById("players").innerText = "Server Offline";
    }
  } catch (e) {
    document.getElementById("status").innerText = "Error";
  }
}

loadServer();
setInterval(loadServer, 3500);

const list = document.getElementById("player-list");

if (data.online && data.players && data.players.list) {
  list.innerHTML = "";

  data.players.list.forEach(player => {
    const div = document.createElement("div");
    div.className = "player-name";
    div.innerText = player;
    list.appendChild(div);
  });

  if (data.players.list.length === 0) {
    list.innerText = "No players online";
  }

} else {
  list.innerText = "Player list not available";
}

</script>

</body>
</html>
